<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marleowww – Profile</title>
  <!-- Tab / Favicon Image -->
  <link rel="icon" type="image/png" href="Marleowww.png">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #1d2671, #c33764);
      --card-bg: #ffffff;
      --text-main: #333;
      --text-sub: #555;
    }

    body.dark {
      --bg-gradient: linear-gradient(135deg, #0f0f0f, #2b2b2b);
      --card-bg: #1e1e1e;
      --text-main: #f0f0f0;
      --text-sub: #cfcfcf;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: var(--bg-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .profile-card {
      background: var(--card-bg);
      background: #fff;
      width: 100%;
      max-width: 900px; /* increased width */
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      display: flex;
      flex-direction: row;
    }

    .profile-left {
      flex: 1;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .profile-left img.avatar {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 5px solid #fff;
      object-fit: cover;
      margin-bottom: 15px;
    }

    .profile-left h2 {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .profile-left p {
      font-size: 15px;
      opacity: 0.95;
    }

    .profile-right {
      flex: 2;
      padding: 40px 35px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .profile-right h3 {
      font-size: 18px;
      margin-bottom: 10px;
      color: var(--text-main);
    }

    .profile-right p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-sub);
      margin-bottom: 25px;
    }

    .social-links {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .social-links a img {
      width: 48px;
      height: 48px;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .social-links a img:hover {
      transform: scale(1.1);
      opacity: 0.85;
    }

    /* Responsive (Phone) */
    @media (max-width: 768px) {
      .profile-card {
        flex-direction: column;
        max-width: 420px;
      }

      .profile-left {
        padding: 30px 20px;
      }

      .profile-right {
        padding: 30px 20px;
        text-align: center;
      }

      .social-links {
        justify-content: center;
      }
    }
  
    /* Theme toggle button */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #fff;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      font-size: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    }

    body.dark .theme-toggle {
      background: #2b2b2b;
      color: #fff;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
  <div class="profile-card">
    <div class="profile-left">
      <img src="Marleowww.png" alt="Marleowww Avatar" class="avatar" onerror="this.src='https://via.placeholder.com/160?text=Marleowww'" />
      <h2>Marleowww</h2>
      <p>Gamer • Student • Creative Person</p>
    </div>

    <div class="profile-right">
      <h3>About Me</h3>
      <p>
        I’m Marleowww — a gamer, student, and creative person who loves exploring new
        ideas, gaming worlds, and expressing creativity in unique ways.
      </p>

      <h3>Connect with me</h3>
      <div class="social-links">
        <a href="https://discord.gg/kFtxPth4Rh" target="_blank" title="Discord">
          <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg" alt="Discord" />
        </a>
        <a href="https://www.youtube.com/@Marleowww" target="_blank" title="YouTube">
          <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg" alt="YouTube" />
        </a>
      </div>
    </div>
  </div>
  <script>
    function toggleTheme() {
      document.body.classList.toggle('dark');
      const btn = document.querySelector('.theme-toggle');
      btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    }
  </script>
</body>
</html>
