<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1d2671, #c33764);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .profile-card {
      background: #fff;
      width: 350px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      text-align: center;
    }

    .profile-header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 30px 20px;
      color: #fff;
    }

    .profile-header img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 4px solid #fff;
      object-fit: cover;
      margin-bottom: 10px;
    }

    .profile-header h2 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .profile-header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .profile-body {
      padding: 20px;
    }

    .profile-body h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #444;
    }

    .profile-body p {
      font-size: 14px;
      line-height: 1.5;
      color: #666;
      margin-bottom: 20px;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .skills span {
      background: #f1f1f1;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: #555;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .social-links a {
      text-decoration: none;
      color: #764ba2;
      font-weight: bold;
      font-size: 14px;
      transition: color 0.2s ease;
    }

    .social-links a:hover {
      color: #667eea;
    }

    .profile-footer {
      padding: 15px;
      background: #f7f7f7;
    }

    .profile-footer button {
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .profile-footer button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="profile-card">
    <div class="profile-header">
      <img src="https://via.placeholder.com/150" alt="Profile Picture" />
      <h2>Your Name</h2>
      <p>Web Developer / Student</p>
    </div>

    <div class="profile-body">
      <h3>About Me</h3>
      <p>
        Hi! I am a passionate learner who loves building websites, playing games,
        and exploring new technologies.
      </p>

      <h3>Skills</h3>
      <div class="skills">
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
        <span>Minecraft</span>
        <span>Git</span>
      </div>

      <div class="social-links">
        <a href="#">GitHub</a>
        <a href="#">Instagram</a>
        <a href="#">Discord</a>
      </div>
    </div>

    <div class="profile-footer">
      <button>Contact Me</button>
    </div>
  </div>
</body>
</html>
